<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/eruda"></script><script>eruda.init();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>กำลังเข้าสู่ระบบ...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Sarabun',sans-serif;
  background:linear-gradient(135deg,#1A9E75,#0F6E56);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;color:#fff;
}
.box{
  text-align:center;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  padding:40px 30px;
  border-radius:24px;
  max-width:360px;
  width:100%;
}
.icon{
  font-size:60px;
  margin-bottom:16px;
}
h1{
  font-size:20px;
  font-weight:600;
  margin-bottom:8px;
}
.subtitle{
  font-size:14px;
  opacity:0.9;
  margin-bottom:24px;
}
.spinner{
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,0.2);
  border-top-color:#fff;
  border-radius:50%;
  margin:0 auto;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.error-icon{font-size:50px;color:#FFE0E0;}
.error-text{
  color:#FFCFCF;
  font-size:13px;
  margin-top:12px;
  line-height:1.6;
}
.btn{
  margin-top:20px;
  padding:12px 28px;
  background:#fff;
  color:#0F6E56;
  border:none;
  border-radius:12px;
  font-family:inherit;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
}
.welcome-name{
  font-size:18px;
  font-weight:600;
  margin:12px 0;
  color:#FFFFFF;
}
</style>
</head>
<body>
<!-- 🐛 DEBUG BOX ชั่วคราว (ลบเมื่อแก้เสร็จ) -->
<div id="dbgBox" style="position:fixed;top:0;left:0;right:0;max-height:45vh;overflow:auto;background:#000;color:#0f0;font:11px monospace;padding:8px;z-index:99999;white-space:pre-wrap;word-break:break-all"></div>
<script>
window.__dbg = function(msg){
  var b=document.getElementById('dbgBox');
  if(b){ b.textContent += msg+'\n'; }
  console.log(msg);
};
window.onerror=function(m,s,l){ __dbg('❌ ERROR: '+m+' @'+l); };
__dbg('[callback] page loaded · '+location.href.substring(0,80));
</script>

<div class="box" id="box">
  <div class="icon">⏳</div>
  <h1>กำลังเข้าสู่ระบบ...</h1>
  <div class="subtitle">โปรดรอสักครู่</div>
  <div class="spinner"></div>
</div>

<script>
const MEDTRACK_BACKEND = 'https://medtrack-backend-production-7731.up.railway.app';

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  const errorDescription = params.get('error_description');
  
  const box = document.getElementById('box');
  
  // Check for OAuth error
  if (error) {
    showError('LINE Login ถูกยกเลิก', errorDescription || 'กรุณาลองใหม่อีกครั้ง');
    return;
  }
  
  if (!code || !state) {
    showError('ลิงก์ไม่ถูกต้อง', 'ไม่พบ code หรือ state จาก LINE');
    return;
  }
  
  // Verify state matches what we saved (localStorage รอดข้าม redirect ใน LINE in-app browser)
  const savedState = localStorage.getItem('mt_login_state') || sessionStorage.getItem('mt_login_state');
  __dbg('[callback] state · saved='+savedState+' url='+state+' match='+(savedState===state));
  if (savedState !== state) {
    __dbg('[callback] ⚠️ state mismatch (backend verify เอง)');
  }
  
  try {
    // Exchange code with backend
    const res = await fetch(`${MEDTRACK_BACKEND}/api/auth/line/callback`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ code, state })
    });
    
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.message || 'ไม่สามารถเข้าสู่ระบบได้');
    }
    
    const data = await res.json();
    
    if (!data.ok || !data.session_token) {
      throw new Error('ตอบกลับไม่ครบถ้วน');
    }
    
    // Save session token + user profile
    localStorage.setItem('mt_session_token', data.session_token);
    localStorage.setItem('mt_user_profile', JSON.stringify({
      user_id: data.user.id,
      id: data.user.id,
      name: data.user.name,
      line_user_id: data.user.line_user_id,
      picture_url: data.user.picture_url
    }));
    // verify token เพิ่งบันทึก อ่านกลับได้จริงไหม (debug in-app browser)
    const savedToken = localStorage.getItem('mt_session_token');
    __dbg('[callback] token saved · ok='+(!!savedToken)+' len='+(savedToken?savedToken.length:0));
    __dbg('[callback] user='+data.user.name+' id='+data.user.id+' is_new='+data.user.is_new+' age='+data.user.age+' gender='+data.user.gender);

    localStorage.removeItem('mt_login_state');
    sessionStorage.removeItem('mt_login_state');
    
    // Show welcome
    box.innerHTML = `
      <div class="icon">🎉</div>
      <h1>${data.user.is_new ? 'ยินดีต้อนรับ!' : 'เข้าสู่ระบบสำเร็จ'}</h1>
      <div class="welcome-name">คุณ${data.user.name}</div>
      <div class="subtitle">กำลังพาไปหน้าหลัก...</div>
      <div class="spinner"></div>
    `;
    
    // Redirect to home (with onboarding if new user OR incomplete profile)
    setTimeout(() => {
      const u = data.user;
      const isCompleted = u.age && u.gender;
      const base = (data.user.is_new || !isCompleted)
        ? '/medtrack-app/medtrack-onboard.html' 
        : '/medtrack-app/medtrack-home.html';
      // ส่ง token + user_id ผ่าน URL — กัน localStorage หายใน LINE in-app browser (iOS)
      // หน้าปลายทางจะอ่านจาก URL แล้ว save ใหม่ + ใช้งานได้แม้ localStorage ไม่ข้ามหน้า
      const target = base + '?token=' + encodeURIComponent(data.session_token) + '&uid=' + u.id;
      __dbg('[callback] ➡️ redirect: '+base+' (แนบ token ใน URL)');
      setTimeout(()=>{ window.location.href = target; }, 6000);
    }, 1500);
    
  } catch(e) {
    console.error('callback error:', e);
    showError('เข้าสู่ระบบไม่สำเร็จ', e.message || 'กรุณาลองใหม่อีกครั้ง');
  }
});

function showError(title, message) {
  document.getElementById('box').innerHTML = `
    <div class="icon error-icon">⚠️</div>
    <h1>${title}</h1>
    <div class="error-text">${message}</div>
    <a href="/medtrack-app/medtrack-login.html" class="btn">กลับไปลองใหม่</a>
  `;
}
</script>

</body>
</html>
