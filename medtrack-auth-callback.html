<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>กำลังเข้าสู่ระบบ...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Sarabun',sans-serif;
  background:linear-gradient(135deg,#1A9E75,#0F6E56);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;color:#fff;
}
.box{
  text-align:center;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  padding:40px 30px;
  border-radius:24px;
  max-width:360px;
  width:100%;
}
.icon{
  font-size:60px;
  margin-bottom:16px;
}
h1{
  font-size:20px;
  font-weight:600;
  margin-bottom:8px;
}
.subtitle{
  font-size:14px;
  opacity:0.9;
  margin-bottom:24px;
}
.spinner{
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,0.2);
  border-top-color:#fff;
  border-radius:50%;
  margin:0 auto;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.error-icon{font-size:50px;color:#FFE0E0;}
.error-text{
  color:#FFCFCF;
  font-size:13px;
  margin-top:12px;
  line-height:1.6;
}
.btn{
  margin-top:20px;
  padding:12px 28px;
  background:#fff;
  color:#0F6E56;
  border:none;
  border-radius:12px;
  font-family:inherit;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
}
.welcome-name{
  font-size:18px;
  font-weight:600;
  margin:12px 0;
  color:#FFFFFF;
}
</style>
</head>
<body>

<div class="box" id="box">
  <div class="icon">⏳</div>
  <h1>กำลังเข้าสู่ระบบ...</h1>
  <div class="subtitle">โปรดรอสักครู่</div>
  <div class="spinner"></div>
</div>

<script>
const MEDTRACK_BACKEND = 'https://medtrack-backend-production-7731.up.railway.app';

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  const errorDescription = params.get('error_description');
  
  const box = document.getElementById('box');
  
  // Check for OAuth error
  if (error) {
    showError('LINE Login ถูกยกเลิก', errorDescription || 'กรุณาลองใหม่อีกครั้ง');
    return;
  }
  
  if (!code || !state) {
    showError('ลิงก์ไม่ถูกต้อง', 'ไม่พบ code หรือ state จาก LINE');
    return;
  }
  
  // Verify state matches what we saved
  const savedState = sessionStorage.getItem('mt_login_state');
  if (savedState !== state) {
    console.warn('state mismatch:', savedState, state);
    // Allow it for now — backend will verify
  }
  
  try {
    // Exchange code with backend
    const res = await fetch(`${MEDTRACK_BACKEND}/api/auth/line/callback`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ code, state })
    });
    
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.message || 'ไม่สามารถเข้าสู่ระบบได้');
    }
    
    const data = await res.json();
    
    if (!data.ok || !data.session_token) {
      throw new Error('ตอบกลับไม่ครบถ้วน');
    }
    
    // Save session token + user profile
    localStorage.setItem('mt_session_token', data.session_token);
    localStorage.setItem('mt_user_profile', JSON.stringify({
      user_id: data.user.id,
      id: data.user.id,
      name: data.user.name,
      line_user_id: data.user.line_user_id,
      picture_url: data.user.picture_url
    }));
    
    sessionStorage.removeItem('mt_login_state');
    
    // Show welcome
    box.innerHTML = `
      <div class="icon">🎉</div>
      <h1>${data.user.is_new ? 'ยินดีต้อนรับ!' : 'เข้าสู่ระบบสำเร็จ'}</h1>
      <div class="welcome-name">คุณ${data.user.name}</div>
      <div class="subtitle">กำลังพาไปหน้าหลัก...</div>
      <div class="spinner"></div>
    `;
    
    // Redirect to home (with onboarding if new user OR incomplete profile)
    setTimeout(() => {
      // 🔧 New user OR profile incomplete (no age/gender/breakfast_time) → onboard
      const u = data.user;
      const isCompleted = u.age && u.gender && u.breakfast_time;
      const target = (data.user.is_new || !isCompleted)
        ? '/medtrack-app/medtrack-onboard.html' 
        : '/medtrack-app/medtrack-home.html';
      console.log('[callback] redirect to:', target, 'is_new=', data.user.is_new, 'completed=', isCompleted);
      window.location.href = target;
    }, 1500);
    
  } catch(e) {
    console.error('callback error:', e);
    showError('เข้าสู่ระบบไม่สำเร็จ', e.message || 'กรุณาลองใหม่อีกครั้ง');
  }
});

function showError(title, message) {
  document.getElementById('box').innerHTML = `
    <div class="icon error-icon">⚠️</div>
    <h1>${title}</h1>
    <div class="error-text">${message}</div>
    <a href="/medtrack-app/medtrack-login.html" class="btn">กลับไปลองใหม่</a>
  `;
}
</script>

</body>
</html>
