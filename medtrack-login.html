<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A9E75">
<title>เข้าสู่ระบบ — MedTrack</title>
<link rel="icon" type="image/png" href="/medtrack-app/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/medtrack-app/apple-touch-icon.png">
<link rel="manifest" href="/medtrack-app/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">

<!-- 🔀 เด้งไป onboard ทันที (เร็วที่สุด ก่อน render) -->
<script>
  // เก็บ query string เดิมไว้ (เผื่อมี lineUserId/user_id แนบมา)
  var _qs = window.location.search || '';
  window.location.replace('/medtrack-app/medtrack-onboard.html' + _qs);
</script>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Sarabun',sans-serif;
    background:linear-gradient(135deg,#1A9E75 0%,#0F6E56 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:20px; color:#fff; text-align:center;
  }
  .box { max-width:340px; }
  .logo { font-size:52px; margin-bottom:14px; }
  h1 { font-size:22px; font-weight:700; margin-bottom:8px; }
  .sub { font-size:14px; opacity:.9; line-height:1.7; margin-bottom:22px; }
  .spinner {
    width:34px; height:34px; margin:0 auto 18px;
    border:3px solid rgba(255,255,255,.3); border-top-color:#fff;
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .btn {
    display:inline-block; padding:13px 28px; background:#fff; color:#0F6E56;
    border-radius:12px; font-size:15px; font-weight:700; text-decoration:none;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <div class="logo">💊</div>
    <h1>MedTrack</h1>
    <div class="sub">กำลังพาไปหน้าเข้าสู่ระบบ...</div>
    <!-- สำรอง: ถ้า JS ไม่ทำงาน / redirect ช้า -->
    <a class="btn" id="goBtn" href="/medtrack-app/medtrack-onboard.html">เข้าสู่ระบบ →</a>
  </div>

<script>
  // สำรองอีกชั้น (เผื่อ script ใน head ไม่ทำงาน)
  (function(){
    var qs = window.location.search || '';
    var target = '/medtrack-app/medtrack-onboard.html' + qs;
    var btn = document.getElementById('goBtn');
    if (btn) btn.href = target;
    setTimeout(function(){ window.location.replace(target); }, 400);
  })();
</script>

<div id="mt-version" style="position:fixed;bottom:4px;right:6px;font:10px -apple-system,sans-serif;color:rgba(150,150,150,0.55);z-index:9998;pointer-events:none;letter-spacing:0.3px">v2026.07.15a</div>
</body>
</html>
